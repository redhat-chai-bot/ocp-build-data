content:
  source:
    dockerfile: ./Dockerfile.ocp
    git:
      branch:
        target: release-{MAJOR}.{MINOR}
      url: git@github.com:openshift-priv/assisted-installer-agent.git
      web: https://github.com/openshift/assisted-installer-agent
    ci_alignment:
      streams_prs:
        ci_build_root:
          stream: rhel-8-golang-ci-build-root
enabled_repos:
- rhel-8-baseos-rpms
- rhel-8-appstream-rpms
- rhel-8-server-ose-rpms-embargoed
for_payload: true
from:
  builder:
  - stream: golang
  member: openshift-enterprise-base
maintainer:
  component: Installer
  subcomponent: Agent based installation
name: openshift/ose-agent-installer-node-agent-rhel8
owners:
- ocp-agent-team@redhat.com
delivery:
  delivery_repo_names:
  - openshift4/ose-agent-installer-node-agent-rhel8
payload_name: agent-installer-node-agent
konflux:
  cachi2:
    lockfile:
      modules:
      - container-tools
      rpms:
      - cpp
      - gcc
      - gcc-c++
      - git
      - git-core
      - git-core-doc
      - libgcc
      - libgomp
      - libstdc++
      - libstdc++-devel
      - nmstate-devel
      - nmstate-libs
      - perl-Git
