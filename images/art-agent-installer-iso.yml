content:
  source:
    path: tools/iso_builder
    dockerfile: Dockerfile
    git:
      branch:
        target: release-{MAJOR}.{MINOR}
      url: git@github.com:openshift-priv/agent-installer-utils.git
      web: https://github.com/openshift/agent-installer-utils
distgit:
  branch: rhaos-{MAJOR}.{MINOR}-rhel-9
  component: ose-art-agent-installer-iso-container
delivery:
  repo_name: art-agent-installer-iso
  delivery_repo_names:
  - ocp-art-tenant/art-agent-installer-iso
for_payload: false
from:
  builder:
  - stream: agent-preinstall-image-builder
  stream: scratch
maintainer:
  component: Installer
  subcomponent: Agent based installation
name: ocp-art-tenant/art-agent-installer-iso
owners:
- ocp-agent-team@redhat.com
konflux:
  no_shell: true  # Skip .oit injected RUN commands (e.g. yum repo setup) since this image does not use RPMs
