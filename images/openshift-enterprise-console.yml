content:
  source:
    dockerfile: Dockerfile.product
    git:
      branch:
        target: release-{MAJOR}.{MINOR}
      url: git@github.com:openshift-priv/console.git
      web: https://github.com/openshift/console
    modifications:
    - action: command
      command:
      - sh
      - -c
      - "echo '\nsupportedArchitectures:\n  os: [\"linux\"]\n  cpu: [\"x64\", \"arm64\"\
        , \"s390x\", \"ppc64\"]' >> frontend/.yarnrc.yml"
    pkg_managers:
    - yarn
cachito:
  enabled: true
  packages:
    yarn:
    - path: frontend
for_payload: true
from:
  builder:
  - stream: golang
  - member: openshift-base-nodejs
  member: openshift-enterprise-base
labels:
  License: GPLv2+
  io.k8s.description: This is a component of OpenShift Container Platform and provides a web console.
  io.k8s.display-name: OpenShift Console
  io.openshift.tags: openshift,console
name: openshift/ose-console
owners:
- spadgett@redhat.com
konflux:
  vm_override:
    x86_64: linux-d160-m2xlarge/amd64
    aarch64: linux-d160-m2xlarge/arm64
  cachito:
    mode: removal
delivery:
  delivery_repo_names:
  - openshift4/ose-console
payload_name: console
