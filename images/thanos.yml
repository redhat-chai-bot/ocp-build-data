content:
  source:
    dockerfile: Dockerfile.ocp
    git:
      branch:
        target: release-{MAJOR}.{MINOR}
      url: git@github.com:openshift-priv/thanos.git
      web: https://github.com/openshift/thanos
    modifications:
    - action: replace
      match: 'promu build;'
      replacement: |
        CGO_ENABLED=1 go build -a -tags "slicelabels" \
            -ldflags "-X github.com/prometheus/common/version.Version=${SOURCE_GIT_TAG} \
                      -X github.com/prometheus/common/version.Revision=${SOURCE_GIT_COMMIT} \
                      -X github.com/prometheus/common/version.Branch=${OS_GIT_MAJOR}.${OS_GIT_MINOR} \
                      -X github.com/prometheus/common/version.BuildUser=doozer \
                      -X github.com/prometheus/common/version.BuildDate=$(date -u +'%Y%m%d-%H:%M:%S')" \
            -o thanos ./cmd/thanos;
    ci_alignment:
      streams_prs:
        auto_label:
        - approved
        - backport-risk-assessed
        - cherry-pick-approved
        - lgtm
        - staff-eng-approved
        - jira/valid-reference
        - verified
        ci_build_root:
          member: ci-openshift-build-root-latest.rhel9
distgit:
  branch: rhaos-{MAJOR}.{MINOR}-rhel-9
  component: ose-thanos-container
delivery:
  # Maps to honeybadger repo_name
  repo_name: ose-thanos
  delivery_repo_names:
  - openshift4/ose-thanos-rhel9
enabled_repos:
- rhel-9-baseos-rpms
- rhel-9-appstream-rpms
- rhel-9-server-ose-rpms-embargoed # required by the builder
for_payload: true
from:
  builder:
  - stream: rhel-9-golang
  member: openshift-enterprise-base-rhel9
name: openshift/ose-thanos-rhel9
payload_name: thanos
owners:
- team-monitoring@redhat.com
konflux:
  cachi2:
    lockfile:
      rpms:
      - openshift-prometheus-promu

