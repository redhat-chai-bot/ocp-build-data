content:
  source:
    dockerfile: Containerfile.konflux
    git:
      branch:
        target: ship-help/konflux-build-support
      url: git@github.com:openshift-priv/os.git
      url_pull: git@github.com:redhat-ship-help/os.git
      web: https://github.com/openshift/os
    ci_alignment:
      streams_prs:
        enabled: false
      mirror: false
distgit:
  branch: rhaos-{MAJOR}.{MINOR}-rhel-9
  component: rhcos-node-image-container
enabled_repos:
- rhel-9-baseos-rpms
- rhel-9-appstream-rpms
- rhel-9-fast-datapath-rpms
- rhel-9-server-ose-rpms
for_payload: false
for_release: false
from:
  builder:
    - stream: rhel_coreos
name: openshift/rhcos-node-image-rhel9
owners:
- aos-team-art@redhat.com
canonical_builders_from_upstream: false
konflux:
  network_mode: open
okd:
  mode: disabled
