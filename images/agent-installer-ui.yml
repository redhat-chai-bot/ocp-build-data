arches:
- x86_64
content:
  source:
    dockerfile: apps/assisted-disconnected-ui/Containerfile.ocp
    git:
      branch:
        target: release-{MAJOR}.{MINOR}
      url: git@github.com:openshift-priv/assisted-installer-ui.git
      web: https://github.com/openshift-assisted/assisted-installer-ui
    modifications:
    - action: replace
      match: "if [ -f ${CACHED_YARN} ]; then"
      replacement: "if true; then"
    - action: replace
      match: npm install -g ${CACHED_YARN};
      replacement: node .yarn/releases/yarn-3.8.7.cjs install --immutable;
    - action: replace
      match: yarn install --immutable && yarn build:all;
      replacement: node .yarn/releases/yarn-3.8.7.cjs build:all;
    pkg_managers:
    - yarn
    artifacts:
      from_urls:
      - target: 3.8.7.tar.gz
        url: https://ocp-artifacts.engineering.redhat.com/github/yarnpkg/berry/archive/refs/tags/@yarnpkg/cli/3.8.7.tar.gz
        sha256: 589c2940e999efb2dd32a26ff5342e255295ade01bbd3395c8d4024a2546bf58
    ci_alignment:
      streams_prs:
        ci_build_root:
          member: ci-openshift-build-root-latest.rhel9
distgit:
  branch: rhaos-{MAJOR}.{MINOR}-rhel-9
  component: assisted-installer-ui-container
delivery:
  repo_name: ose-agent-installer-ui-rhel9
  delivery_repo_names:
  - openshift5/ose-agent-installer-ui-rhel9
for_payload: true
from:
  builder:
  - member: openshift-base-nodejs.rhel9
  - stream: rhel-9-golang
  member: openshift-enterprise-base-rhel9
name: openshift/assisted-installer-ui-rhel9
owners:
- afasano@redhat.com
- bfournie@redhat.com
- ppinjark@redhat.com
- rwsu@redhat.com@redhat.com
payload_name: agent-installer-ui
konflux:
  cachito:
    mode: emulation
  vm_override:
    x86_64: linux-d160-c4xlarge/amd64
