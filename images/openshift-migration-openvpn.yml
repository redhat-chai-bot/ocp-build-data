content:
  source:
    dockerfile: konflux.Dockerfile
    git:
      branch:
        target: release-1.8
      url: git@github.com:openshift-priv/migtools-openvpn.git
      web: https://github.com/migtools/openvpn
    modifications:
      # https://github.com/migtools/openvpn/blob/release-1.8/konflux.Dockerfile#L17
      - action: replace
        match: "dnf -y install cpio"
        replacement: "microdnf -y install cpio"
      - action: replace
        match: "dnf clean all"
        replacement: "microdnf clean all"
delivery:
  delivery_repo_names:
    - rhmtc/openshift-migration-openvpn-rhel8
dependents:
  - openshift-migration-operator
distgit:
  branch: rhaos-{MAJOR}.{MINOR}-rhel-8
  component: openshift-migration-openvpn-container
enabled_repos:
  - rhel-8-appstream-rpms
  - rhel-8-baseos-rpms
  - rhel-8-codeready-builder-rpms
for_payload: false
from:
  builder:
    - stream: rhel-8-builder
  member: base-rhel8
konflux:
