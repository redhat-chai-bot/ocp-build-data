cachito:
  packages:
    gomod:
      - path: .
content:
  source:
    dockerfile: Containerfile.art
    git:
      allow_unprotected_branch: true
      branch:
        target: release-0.5.2
      url: git@github.com:openshift-priv/external-secrets-bitwarden-sdk-server.git
      url_pull: https://github.com/fbladilo/external-secrets-bitwarden-sdk-server.git
      web: https://github.com/openshift/external-secrets-bitwarden-sdk-server
distgit:
  component: external-secrets-bitwarden-sdk-server-container
  branch: rhaos-{MAJOR}.{MINOR}-rhel-9
delivery:
  delivery_repo_names:
    - external-secrets-operator/bitwarden-sdk-server-rhel9
for_payload: false
enabled_repos:
  - rhel-9-appstream-rpms
  - rhel-9-baseos-rpms
from:
  builder:
    - stream: rhel-9-golang
  member: base-rhel9
name: external-secrets-operator/bitwarden-sdk-server-rhel9
owners:
  - tgeer@redhat.com
  - mykastur@redhat.com
  - bhb@redhat.com
  - sbhor@redhat.com
dependents:
  - external-secrets-operator
# bitwarden-sdk-server only supports x86_64 and aarch64
arches:
  - x86_64
  - aarch64
jira:
  project: ESO
  component: External Secrets Operator
