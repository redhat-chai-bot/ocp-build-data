    content_set:
      default: codeready-builder-for-rhel-9-x86_64-rpms
      aarch64: codeready-builder-for-rhel-9-aarch64-rpms
      ppc64le: codeready-builder-for-rhel-9-ppc64le-rpms
      s390x: codeready-builder-for-rhel-9-s390x-rpms
    reposync:
      enabled: false
