name: installer-ove-ui-4.21
product: installer-ove-ui
version: "4.21"

vars:
  MAJOR: 4
  MINOR: 21


arches:
- x86_64_root


konflux:
  arches:
  - x86_64_root
  network_mode: open
  image_repo: quay.io/redhat-user-workloads/ocp-art-tenant/art-agent-installer-iso
  privileged_nested: true
  additional_secret: ove-ui-image-pull-secret
  build_step_resources:
    memory: "8Gi"
    ephemeral-storage: "250Gi"
  build_args:
  - "RELEASE_FLAG=--release-image-url"
  - "RELEASE_VALUE=quay.io/openshift-release-dev/ocp-release:4.21.5-x86_64"
  - "MAJOR_MINOR_VERSION=4.21"
  - "PATCH_VERSION=5"
  - "ARCH=x86_64"

assemblies:
  enabled: true

public_upstreams:
- private: "https://github.com/openshift-priv"
  public:  "https://github.com/openshift"


urls:
  brewhub: https://brewhub.engineering.redhat.com/brewhub
  brew_image_host: registry-proxy.engineering.redhat.com
  brew_image_namespace: rh-osbs
