name: installer-ove-ui-4.20
product: installer-ove-ui
version: "4.20"

vars:
  MAJOR: 4
  MINOR: 20


arches:
- x86_64_root


konflux:
  arches:
  - x86_64_root
  network_mode: open
  image_repo: quay.io/redhat-user-workloads/ocp-art-tenant/art-agent-installer-iso
  additional_build_args:
  - privileged-nested: true
  - release-value: "quay.io/openshift-release-dev/ocp-release:4.21.0-ec.1-x86_64"
  - major-minor-version: "4.21"
  - patch-version: "0"
  build_args:
  - "RELEASE_FLAG=--release-image-url"
  - "RELEASE_VALUE=$(params.release-value)"
  - "MAJOR_MINOR_VERSION=$(params.major-minor-version)"
  - "PATCH_VERSION=$(params.patch-version)"
  - "ARCH=x86_64"

assemblies:
  enabled: true

public_upstreams:
- private: "https://github.com/openshift-priv"
  public:  "https://github.com/openshift"


urls:
  brewhub: https://brewhub.engineering.redhat.com/brewhub
  brew_image_host: registry-proxy.engineering.redhat.com
  brew_image_namespace: rh-osbs
