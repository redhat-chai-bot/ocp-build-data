    - rhel-9-golang-{GO_LATEST}
  # Pinned to RHEL 9.6-based go-toolset 1.24.4 (9.6-1755074415) to avoid
  # crypto-policies/openssh RPM conflict with RHEL 9.6 EUS repos.
